# HTTP - 重定向到 HTTPS
server {
    listen 80;
    server_name md.foolgry.top admin.md.foolgry.top;
    return 301 https://$server_name$request_uri;
}

# HTTPS - md.foolgry.top（公开访问）
server {
    listen 443 ssl http2;
    server_name md.foolgry.top;
    
    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/md.foolgry.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/md.foolgry.top/privkey.pem;
    
    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    location / {
        root /opt/huasheng-editor/frontend;
        index index.html;
        try_files $uri $uri/ =404;
    }
    
    # 分享页面和 API - 转发到后端
    location ~ ^/(s|api)/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS - admin.md.foolgry.top（需要认证）
server {
    listen 443 ssl http2;
    server_name admin.md.foolgry.top;
    
    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/md.foolgry.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/md.foolgry.top/privkey.pem;
    
    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # HTTP Basic Auth
    auth_basic "编辑器登录";
    auth_basic_user_file /etc/nginx/.htpasswd;
    
    # 编辑器页面
    location / {
        root /opt/huasheng-editor/frontend;
        index editor.html;
        try_files $uri $uri/ /editor.html;
    }
    
    # 分享功能（编辑器内部使用）
    location ~ ^/(s|api)/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        auth_basic off;
    }
}
